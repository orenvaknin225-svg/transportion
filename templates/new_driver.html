<!DOCTYPE html>
<html lang="he" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>נהג חדש</title>
<style>body{font-family:Arial;max-width:700px;margin:25px auto;padding:15px;background:#f5f5f5;direction:rtl}.box{background:white;padding:18px;border-radius:12px}input,textarea,button{width:100%;padding:11px;margin-top:8px;box-sizing:border-box}button,.btn{background:#222;color:white;border:0;border-radius:8px;padding:10px;text-decoration:none}</style></head>
<body>
<a class="btn" href="/drivers">חזרה</a>
<div class="box">
<h1>הוספת נהג</h1>
<form method="POST">
<input name="name" placeholder="שם נהג" required>
<input name="personal_number" placeholder="מספר אישי" required>
<input name="license_number" placeholder="מספר רישיון">
<input name="license_type" placeholder="סוג רישיון">
<label>תוקף רישיון</label><input type="date" name="license_expiry">
<textarea name="notes" placeholder="הערות"></textarea>
<button>שמור</button>
</form>
</div>
</body>
</html>
