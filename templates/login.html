
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ניהול צי רכב</title>
<style>
body{font-family:Arial;max-width:550px;margin:40px auto;padding:15px;background:#f5f5f5;direction:rtl}
.box{background:white;padding:20px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
input,button{width:100%;padding:12px;margin-top:10px;box-sizing:border-box}
button{background:#222;color:white;border:0;border-radius:8px}
.msg{background:#fff3cd;padding:10px;border-radius:8px;margin-bottom:10px}
</style>
</head>
<body>
<h1>ניהול צי רכב</h1>

{% with messages = get_flashed_messages() %}
{% for message in messages %}
<div class="msg">{{ message }}</div>
{% endfor %}
{% endwith %}

<div class="box">
<form method="POST" action="/login">
<input name="username" placeholder="שם משתמש" required>
<input name="password" type="password" placeholder="סיסמה" required>
<button>כניסה</button>
</form>
</div>
</body>
</html>
